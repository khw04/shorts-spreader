<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shorts Spreader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Task 5 connection</p>
        <div class="hero-row">
          <h1>Shorts Spreader</h1>
          <span id="connection-pill" class="pill disconnected">Disconnected</span>
        </div>
        <p id="status-copy" class="status-copy">Background service is checking the socket.</p>
        <p id="socket-meta" class="status-copy">Socket info will appear here.</p>
        <p id="http-meta" class="status-copy">HTTP probe will appear here.</p>
      </section>

      <section class="panel">
        <label class="field" for="nickname-input">
          <span>Nickname</span>
          <input id="nickname-input" type="text" maxlength="40" placeholder="Quiet Otter" autocomplete="off" />
        </label>
        <button id="save-nickname-button" class="primary-button" type="button">Save nickname</button>
      </section>

      <section class="panel">
        <button id="spread-button" class="primary-button" type="button">Spread current shorts</button>
        <p id="spread-status" class="status-copy">The active tab will be used automatically when it is a YouTube Shorts page.</p>
      </section>

      <section class="stats-grid" aria-label="My counters">
        <article class="stat-card">
          <span class="stat-label">My spread count</span>
          <strong id="spread-count">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">My hit count</span>
          <strong id="hit-count">0</strong>
        </article>
      </section>

      <button id="dashboard-button" class="secondary-button" type="button">Open dashboard</button>
    </main>
    <script src="shared.js"></script>
    <script src="popup-state.js"></script>
    <script src="popup.js"></script>
  </body>
  </html>
