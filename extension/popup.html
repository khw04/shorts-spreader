<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>쇼츠 살포기</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>🔥 쇼츠 살포기</h1>

    <div class="status-block">
      <div id="connection-pill" class="status disconnected">🔴 연결 안됨</div>
      <p id="status-copy" class="status-copy">연결 상태 확인 중...</p>
      <p id="socket-meta" class="meta-text"></p>
      <p id="http-meta" class="meta-text"></p>
    </div>

    <div class="section">
      <label>닉네임</label>
      <div class="input-row">
        <input type="text" id="nickname-input" maxlength="40" placeholder="조용한 수달" autocomplete="off">
        <button id="save-nickname-button">저장</button>
      </div>
    </div>

    <div class="section mute-section">
      <label>수신 소리</label>
      <div class="mute-row">
        <input type="checkbox" id="mute-checkbox" checked>
        <span id="mute-label">켜짐</span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-num" id="spread-count">0</div>
        <div class="stat-lbl">살포</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="hit-count">0</div>
        <div class="stat-lbl">피격</div>
      </div>
    </div>

    <button class="dashboard-btn" id="dashboard-button">📊 대시보드 열기</button>
  </div>
  <script src="shared.js"></script>
  <script src="popup-state.js"></script>
  <script src="popup.js"></script>
</body>
</html>
